<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Tank Arena</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="game"></canvas>

<div id="hud">
  <button id="gear" aria-label="Tuning">⚙</button>
  <button id="modeBtn">Mode: Brawl<small>release stick to fire</small></button>
  <div class="pill" id="score">Hits 0</div>
</div>

<div id="panel">
  <button id="closePanel" aria-label="Close">×</button>
  <h2>Feel tuning</h2>
  <div class="row"><label>Move speed<span id="vMove"></span></label><input id="move" type="range" min="120" max="520" step="10"></div>
  <div class="row"><label>Turret weight (lerp)<span id="vTurret"></span></label><input id="turret" type="range" min="0.05" max="1" step="0.01"></div>
  <div class="row"><label>Body turn ease<span id="vBody"></span></label><input id="body" type="range" min="0.05" max="1" step="0.01"></div>
  <div class="row"><label>Shell speed<span id="vShell"></span></label><input id="shell" type="range" min="240" max="900" step="20"></div>
  <div class="row"><label>Shell bounces<span id="vBounce"></span></label><input id="bounce" type="range" min="0" max="4" step="1"></div>
  <div class="row"><label>Fire cooldown (ms)<span id="vCd"></span></label><input id="cd" type="range" min="0" max="900" step="20"></div>
  <div class="row"><label>Cancel deadzone (Brawl)<span id="vDz"></span></label><input id="dz" type="range" min="0" max="60" step="2"></div>
  <div class="row"><label>Stick radius<span id="vRad"></span></label><input id="rad" type="range" min="50" max="130" step="5"></div>
  <div class="row"><label>Max shells on screen<span id="vMax"></span></label><input id="maxshell" type="range" min="1" max="8" step="1"></div>
  <div class="toggle"><span>Aim trajectory preview</span><input id="preview" type="checkbox"></div>
  <div class="toggle"><span>Haptics</span><input id="haptics" type="checkbox"></div>
  <div class="toggle"><span>Screen shake</span><input id="shake" type="checkbox"></div>
  <button id="reset">Reset to defaults</button>
</div>

<div id="start">
  <h1>Tank Arena</h1>
  <p>Left thumb drives. Right thumb aims. Toggle between <b>Brawl</b> (release the aim stick to fire, release in the center to cancel) and <b>PUBG</b> (aim stick only + an index-finger trigger, top-right).</p>
  <p class="rotateHint" id="rotateHint">Best in landscape on your phone.</p>
  <button id="startBtn">Tap to start</button>
</div>

<!-- Load order = dependency order (modules share global scope, no bundler). -->
<script src="src/config.js"></script>
<script src="src/state.js"></script>
<script src="src/input.js"></script>
<script src="src/logic.js"></script>
<script src="src/render.js"></script>
<script src="src/ui.js"></script>
<script src="src/main.js"></script>
</body>
</html>
